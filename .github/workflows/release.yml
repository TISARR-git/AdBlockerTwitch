name: Build and Release Extension

on:
  push:
    tags:
      - 'v*' # Runs only when pushing a tag starting with 'v' (e.g. v1.0.0)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install web-ext -g

      - name: Build both versions
        run: node build.js

      - name: Zip Chrome version
        run: |
          cd dist/chrome
          zip -r ../TwitchAdBlocker-Chrome.zip .

      - name: Sign Firefox extension
        run: web-ext sign --source-dir dist/firefox/ --channel unlisted --api-key ${{ secrets.AMO_JWT_ISSUER }} --api-secret ${{ secrets.AMO_JWT_SECRET }} --timeout 1200000

      - name: Rename downloaded Firefox XPI
        run: |
          mv web-ext-artifacts/*.xpi dist/TwitchAdBlocker-Firefox.xpi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TwitchAdBlocker-Chrome.zip
            dist/TwitchAdBlocker-Firefox.xpi
          generate_release_notes: true
